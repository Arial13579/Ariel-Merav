<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta tags לקידום האתר (SEO) ב-GitHub -->
    <meta name="description" content="Snap Box - בוטיק עמדות צילום פרימיום מעץ טבעי לאירועים">
    <title>Snap Box | בוטיק עמדות צילום</title>
    
    <!-- לוגו בלשונית הדפדפן - וודא שהקובץ logo.jpg נמצא בתיקייה הראשית ב-GitHub -->
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <!-- Scripts חיצוניים -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --base-font-size: 16px; }
        html { font-size: var(--base-font-size); transition: font-size 0.3s ease; }
        body { font-family: 'Assistant', sans-serif; overflow-x: hidden; scroll-behavior: smooth; background-color: #FCFBFA; color: #1A1A1A; transition: background 0.3s, color 0.3s; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* גלריה אינסופית - מותאם למובייל ולדסקטופ ב-GitHub */
        .marquee-container { overflow: hidden; width: 100%; padding: 3rem 0; background: #fff; margin: 2rem 0; white-space: nowrap; }
        .marquee-content { display: inline-flex; gap: 2rem; width: max-content; animation: scroll-left 40s linear infinite; }
        .gallery-item { height: 350px; width: auto; border-radius: 20px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* נגישות */
        .large-text-active { --base-font-size: 20px; }
        .high-contrast-active { background-color: #000 !important; color: #fff !important; }
        .high-contrast-active .bg-white, .high-contrast-active .form-container, .high-contrast-active .marquee-container { background-color: #1a1a1a !important; color: #fff !important; border-color: #fff !important; }
        .highlight-active a, .highlight-active button:not(#accMainBtn) { outline: 3px solid #D4AF37 !important; outline-offset: 4px !important; }

        /* תפריט נגישות צף */
        .acc-option { position: absolute; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); opacity: 0; pointer-events: none; transform: scale(0); }
        .acc-menu-open .acc-option { opacity: 1; pointer-events: auto; transform: scale(1); }
        .acc-menu-open .opt-1 { transform: translate(0, 75px); }
        .acc-menu-open .opt-2 { transform: translate(65px, 45px); }
        .acc-menu-open .opt-3 { transform: translate(75px, -20px); }

        /* כפתור וואטסאפ */
        .whatsapp-float { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; border-radius: 50px; display: flex; align-items: center; justify-content: center; z-index: 400; transition: all 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .whatsapp-float:hover { transform: scale(1.1) rotate(5deg); background-color: #D4AF37 !important; }
    </style>
</head>
<body>

    <!-- כפתור וואטסאפ -->
    <a href="https://wa.me/972546056180?text=היי%20מה%20נשמע%20רציתי%20לשמוע%20יותר%20על%20החבילות%20שלכם%20של%20העמדת%20צילום?" 
       class="whatsapp-float" 
       style="background-color: #1A1A1A !important; color: #FFFFFF !important;"
       target="_blank" rel="noopener">
        <i data-lucide="message-circle" style="width: 32px; height: 32px;"></i>
    </a>

    <!-- תפריט נגישות -->
    <div id="accWrapper" class="fixed top-24 left-6 z-[300] flex flex-col items-center">
        <button onclick="toggleAccMenu()" id="accMainBtn" class="w-14 h-14 rounded-full bg-[#1A1A1A] text-white flex items-center justify-center border border-white/20 shadow-2xl">
            <i data-lucide="accessibility"></i>
        </button>
        <button onclick="toggleLargeText()" class="acc-option opt-1 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border border-gray-100"><b>A+</b></button>
        <button onclick="toggleContrast()" class="acc-option opt-2 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border border-gray-100"><i data-lucide="contrast" size="18"></i></button>
        <button onclick="toggleHighlight()" class="acc-option opt-3 bg-white text-black w-12 h-12 rounded-full shadow-xl flex items-center justify-center border border-gray-100"><i data-lucide="eye" size="18"></i></button>
    </div>

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-[150] px-4 py-6">
        <nav class="max-w-7xl mx-auto flex justify-between items-center p-4 px-10 rounded-full bg-white/70 backdrop-blur-xl border border-gray-100 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="text-[#D4AF37]">
                    <svg viewBox="0 0 100 100" class="h-9 w-9" fill="none" stroke="currentColor"><path d="M50 45 L35 75 M50 45 L65 75" stroke-width="2.5"/><rect x="32" y="30" width="36" height="22" rx="3" stroke-width="2.5"/><circle cx="50" cy="41" r="5" stroke-width="2.5"/></svg>
                </div>
                <div class="flex flex-col">
                    <span class="font-black uppercase leading-none">Snap Box</span>
                    <span class="text-[9px] font-bold tracking-[0.1em] text-gray-500 uppercase">Premium Photo Booth</span>
                </div>
            </div>
            <button onclick="document.getElementById('contact-form').scrollIntoView({behavior:'smooth'})" class="bg-[#1A1A1A] text-white rounded-full px-6 py-2 text-xs font-bold hover:bg-[#D4AF37] transition-all">שריינו תאריך</button>
        </nav>
    </header>

    <!-- Hero -->
    <section class="pt-64 pb-20 text-center px-6">
        <span class="text-[#D4AF37] font-bold uppercase tracking-[0.4em] text-xs">פשוט רגעים יפים</span>
        <h1 class="text-6xl md:text-8xl italic font-serif mt-4">היופי שברגע <br><span class="text-[#D4AF37] not-italic font-light">מעץ טבעי.</span></h1>
    </section>

    <!-- Marquee Gallery -->
    <div class="marquee-container">
        <div class="marquee-content">
            <!-- שים לב: כל הקבצים האלו חייבים להיות מועלים לתיקייה הראשית ב-GitHub -->
            <img src="photo_5949512990937779361_y.jpg" class="gallery-item" alt="1">
            <video src="document_5990337496439856182.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5949512990937779362_y.jpg" class="gallery-item" alt="2">
            <video src="document_5990337496439856181.mp4" class="gallery-item" autoplay muted loop playsinline></video>
            <img src="photo_5949512990937779363_y.jpg" class="gallery-item" alt="3">
            <img src="photo_5990337496899849480_y.jpg" class="gallery-item" alt="4">
            <!-- שכפול ללופ חלק -->
            <img src="photo_5949512990937779361_y.jpg" class="gallery-item" alt="1">
            <video src="document_5990337496439856182.mp4" class="gallery-item" autoplay muted loop playsinline></video>
        </div>
    </div>

    <!-- Booking Form -->
    <section id="contact-form" class="py-20 px-6 max-w-5xl mx-auto">
        <div class="form-container bg-white p-10 md:p-20 rounded-[50px] shadow-2xl border border-gray-50">
            <h2 class="text-4xl md:text-5xl font-serif italic text-center mb-16">בואו נתחיל לתכנן</h2>
            <form onsubmit="sendToWhatsapp(event)" class="space-y-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="border-b py-2"><label class="text-[#D4AF37] text-[10px] font-bold uppercase">שם מלא</label><input type="text" id="name" required class="w-full bg-transparent py-2 outline-none text-lg" placeholder="איך קוראים לכם?"></div>
                    <div class="border-b py-2"><label class="text-[#D4AF37] text-[10px] font-bold uppercase block text-right">טלפון</label><input type="tel" id="phone" required class="w-full bg-transparent py-2 outline-none text-left text-lg" placeholder="050-0000000"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                    <div class="border-b"><label class="text-[#D4AF37] text-[10px] font-bold uppercase">סוג אירוע</label>
                        <select id="eventType" required class="w-full bg-transparent py-4 outline-none text-base">
                            <option value="" disabled selected>בחרו סוג אירוע</option>
                            <option>חתונה</option><option>בר/בת מצווה</option><option>עסקי</option><option>אחר</option>
                        </select>
                    </div>
                    <div class="border-b"><label class="text-[#D4AF37] text-[10px] font-bold uppercase">כמות מוזמנים</label><input type="number" id="guests" class="w-full bg-transparent py-4 outline-none" placeholder="כמות משוערת"></div>
                    <div class="border-b"><label class="text-[#D4AF37] text-[10px] font-bold uppercase">תאריך</label>
                        <div class="flex gap-1"><select id="day" class="bg-transparent py-4 outline-none flex-1 text-sm"></select><select id="month" class="bg-transparent py-4 outline-none flex-1 text-sm"></select><select id="year" class="bg-transparent py-4 outline-none flex-1 text-sm"></select></div>
                    </div>
                </div>
                <div class="border-b py-2"><label class="text-[#D4AF37] text-[10px] font-bold uppercase">הערות</label><textarea id="notes" rows="1" class="w-full bg-transparent py-2 outline-none resize-none" placeholder="משהו שחשוב שנדע?"></textarea></div>
                <button type="submit" class="w-full py-5 bg-[#1A1A1A] text-white rounded-2xl text-lg font-bold hover:bg-[#D4AF37] transition-all shadow-xl">שלחו הודעה לתיאום</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-20 text-center border-t border-gray-100">
        <div class="flex justify-center gap-10 mb-10">
            <a href="https://www.instagram.com/snapbox_event.official" target="_blank" class="hover:text-[#D4AF37] transition-colors"><i data-lucide="instagram" size="28"></i></a>
            <a href="https://www.facebook.com/share/18GcWQXLqA/" target="_blank" class="hover:text-[#D4AF37] transition-colors"><i data-lucide="facebook" size="28"></i></a>
        </div>
        <span class="text-2xl font-black uppercase tracking-[0.3em]">Snap Box</span>
        <p class="text-[10px] text-gray-400 mt-4 uppercase">© 2026 Premium Photo Booth Studio</p>
    </footer>

    <script>
        lucide.createIcons();

        // אתחול תאריכים
        const d = document.getElementById('day'), m = document.getElementById('month'), y = document.getElementById('year');
        for(let i=1; i<=31; i++) d.options.add(new Option(i, i));
        for(let i=1; i<=12; i++) m.options.add(new Option(i, i));
        const cy = new Date().getFullYear();
        for(let i=cy; i<=cy+3; i++) y.options.add(new Option(i, i));

        // פונקציות נגישות
        function toggleAccMenu() { document.getElementById('accWrapper').classList.toggle('acc-menu-open'); }
        function toggleLargeText() { document.documentElement.classList.toggle('large-text-active'); }
        function toggleContrast() { document.body.classList.toggle('high-contrast-active'); }
        function toggleHighlight() { document.body.classList.toggle('highlight-active'); }

        // שליחה לוואטסאפ
        function sendToWhatsapp(e) {
            e.preventDefault();
            const date = `${d.value}/${m.value}/${y.value}`;
            const text = `✨ *הזמנה חדשה מהאתר* ✨\n\n👤 *שם:* ${document.getElementById('name').value}\n🎉 *אירוע:* ${document.getElementById('eventType').value}\n👥 *מוזמנים:* ${document.getElementById('guests').value || 'לא צוין'}\n📅 *תאריך:* ${date}\n📝 *הערות:* ${document.getElementById('notes').value || 'אין'}`;
            window.open(`https://wa.me/972546056180?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
